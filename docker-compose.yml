version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: omnivis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: omnivis
      POSTGRES_PASSWORD: omnivis_password
      POSTGRES_DB: omnivis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnivis"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
